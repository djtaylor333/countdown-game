name: Build & Release Android

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android-app

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android-app

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: countdown-game-debug
          path: android-app/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: android-app

      - name: Create keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > countdown-release.jks
          echo "storeFile=countdown-release.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
        working-directory: android-app

      - name: Build release APK & AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        working-directory: android-app

      - name: Get version name
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CountDown Game ${{ steps.version.outputs.VERSION }}"
          body: |
            ## CountDown Game ${{ steps.version.outputs.VERSION }}

            A daily word and numbers puzzle game inspired by the British TV show Countdown.

            ### Features
            - **Letters Round**: Select 9 letters (consonants/vowels), find the longest word in 30 seconds
            - **Numbers Round**: Use 6 numbers and basic arithmetic to reach a 3-digit target in 30 seconds
            - **Daily Challenge**: Same puzzle for everyone, resets at midnight
            - **Streak Tracking**: Keep your daily play and completion streaks alive

            ### Android Installation
            1. Download the APK file below
            2. Transfer to your Android device
            3. Enable "Install from unknown sources" if prompted
            4. Open the APK to install

            ### Requirements
            - Android 10 (API 29) or higher

            ### Web App
            Play in your browser at: https://djtaylor333.github.io/countdown-game/
          files: |
            android-app/app/build/outputs/apk/release/*.apk
            android-app/app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
